name: "@foundrynet/forge"
displayName: "FoundryNet Industrial Intelligence"
description: >-
  Cross-OEM industrial telemetry normalization across 18 equipment manufacturers with 366 canonical fields. Runtime kernel for machine data pipelines.
icon: "🏭"
homepage: "https://foundrynet.io"
repository: "https://github.com/FoundryNet/forge-mcp"
license: "MIT"
categories:
  - industrial
  - data
  - iot
tags:
  - industrial-telemetry
  - opc-ua
  - cnc
  - fanuc
  - siemens
  - machine-data
  - normalization
  - iot
keywords:
  - industrial-telemetry
  - opc-ua
  - cnc
  - fanuc
  - siemens
  - machine-data
  - normalization
  - iot
attestation:
  protocol: "MINT Protocol"
  verified_outputs: true
  live_feed: "https://mint.foundrynet.io/feed"
network:
  name: "FoundryNet Data Network"
  servers: 17
startCommand:
  type: http
  url: "https://foundrynet-mcp-production.up.railway.app/mcp"
  transport: streamable-http
  configSchema:
    type: object
    properties:
      api_key:
        type: string
        title: "Forge billing key (optional)"
        description: "fnet_ key to bypass the per-query x402 paywall and bill to a Forge account."
