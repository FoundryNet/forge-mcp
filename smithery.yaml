# Smithery listing metadata — FoundryNet Forge MCP
# Scope stays @foundrynet/forge so Smithery RE-INDEXES the existing listing
# (do not rename the scope — that would create a new, empty listing).
name: "@foundrynet/forge"
displayName: "Forge by Foundry Labs — Industrial Machine Intelligence"
description: >-
  Natural language to machine action. Cross-manufacturer industrial telemetry
  normalization across 18 OEM families with thousands of confirmed field mappings.
  30 MCP tools for machine identity, normalization, history, plain-English
  automation, TimesFM prediction (forecast, threshold-breach, remaining-life,
  batch + fleet health, anomaly detection, full-stack machine intelligence),
  and tamper-evident work attestation.

# Hosted, URL-based ("external") server — Smithery's Gateway proxies user traffic
# to the upstream Railway Streamable HTTP endpoint and injects the user's fnet_ Bearer key.
startCommand:
  type: http
  url: "https://mcp.foundrynet.io/mcp"
  transport: streamable-http
  configSchema:
    type: object
    required:
      - api_key
    properties:
      api_key:
        type: string
        title: "FoundryNet API key"
        description: "fnet_ Bearer key — get one free at foundrynet.io/signup"

homepage: "https://foundrynet.io"
documentationUrl: "https://foundrynet.io/docs"
license: "Proprietary"
keywords:
  - industrial
  - manufacturing
  - machine-identity
  - cnc
  - robotics
  - normalization
  - iot
  - automation
  - attestation

# Re-index nudge for Smithery (30 tools, mcp.foundrynet.io, Forge by Foundry Labs) — 2026-07-16
